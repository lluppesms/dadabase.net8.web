# ------------------------------------------------------------------------------------------------------------------------
# Pipeline Template to build and deploy Application Only
# ------------------------------------------------------------------------------------------------------------------------
parameters:
- name: runUnitTests
  default: 'false'

# ----------------------------------------------------------------------------------------------------
stages:
- stage: BuildWebApp
  displayName: Build WebApp
  jobs:
  - template: ../jobs/webapp-build-job.yml
    parameters:
      environmentName: 'DEV'
      runUnitTests: ${{ parameters.runUnitTests }}

