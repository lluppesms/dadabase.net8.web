# ----------------------------------------------------------------------------------------------------
# Template to deploy a Docker container to Azure Container Apps
# ----------------------------------------------------------------------------------------------------
parameters: 
- name: environmentName
  default:  'DEV'
- name: containerImage
  default: ''
- name: buildStageName
  default: ''
- name: buildJobName
  default: ''

# ------------------------------------------------------------------------------------------------------------------------
jobs:
- deployment: InitializeDeploy${{ parameters.environmentName }}ContainerApp
  displayName: Initialize ${{ parameters.environmentName }} Container App
  environment: ${{ parameters.environmentName }}

- job: Deploy${{ parameters.environmentName }}ContainerApp
  displayName: Deploy ${{ parameters.environmentName }} Container App
  
  variables:
    - name: environmentName
      value: ${{ parameters.environmentName }}
    - name: environmentNameUpper
      value: ${{ upper(parameters.environmentName) }}
    - name: environmentNameLower
      value: ${{ lower(parameters.environmentName) }}
    - name: fullAppName
      value: '$(APP_NAME)$(INSTANCE_NUMBER)-ca-$(environmentNameLower)'
    - template: ../vars/var-common.yml
    - template: ../vars/var-service-connections.yml
    
    - ${{ if ne(parameters.buildJobName, '') }}:
      - name: containerImage
        value: $[ stageDependencies.${{ parameters.buildStageName }}.${{ parameters.buildJobName }}.outputs['containerOutput.fullImageName'] ]
    - ${{ if eq(parameters.buildJobName, '') }}:
      - name: containerImage
        value: ${{ parameters.containerImage }}

  steps:
  - task: Bash@3
    displayName: 'Display Variables'
    inputs:
      targetType: 'inline'
      script: |
        echo "##[group]Display All Environment Variables:"
        printenv | sort
        echo "##[endgroup]"
        
        echo "environmentName=$(environmentName)"
        echo "fullAppName=$(fullAppName)"
        echo "containerImage=$(containerImage)"
    continueOnError: true

  - task: AzureCLI@2
    displayName: 'Get Container App Name'
    inputs:
      azureSubscription: $(serviceConnectionName)
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        # Get resource group name
        RESOURCE_GROUP_NAME=$(RESOURCE_GROUP_PREFIX)-$(INSTANCE_NUMBER)-$(environmentNameLower)
        echo "Resource Group: $RESOURCE_GROUP_NAME"
        echo "fullAppName: $(fullAppName)"
        
        # Get Container App name
        CONTAINER_APP_NAME=$(az containerapp list \
          --resource-group $RESOURCE_GROUP_NAME \
          --query "[?contains(name, '$(fullAppName)')].name" -o tsv)
        
        echo "##vso[task.setvariable variable=containerAppName]$CONTAINER_APP_NAME"
        echo "##vso[task.setvariable variable=resourceGroupName]$RESOURCE_GROUP_NAME"
        echo "Container App Name: $CONTAINER_APP_NAME"

  - task: AzureCLI@2
    displayName: 'Deploy to Container App'
    inputs:
      azureSubscription: $(serviceConnectionName)
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        echo "Deploying image: $(containerImage)"
        echo "To Container App: $(containerAppName)"
        echo "In Resource Group: $(resourceGroupName)"
        
        az containerapp update \
          --name $(containerAppName) \
          --resource-group $(resourceGroupName) \
          --image $(containerImage)

  - task: AzureCLI@2
    displayName: 'Get Container App URL'
    inputs:
      azureSubscription: $(serviceConnectionName)
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        FQDN=$(az containerapp show \
          --name $(containerAppName) \
          --resource-group $(resourceGroupName) \
          --query properties.configuration.ingress.fqdn -o tsv)
        
        echo "##vso[task.setvariable variable=containerAppUrl]https://$FQDN"
        echo "========================================" 
        echo "Container App URL: https://$FQDN"
        echo "========================================"
        echo "##vso[task.complete result=Succeeded;]Deployment successful!"
